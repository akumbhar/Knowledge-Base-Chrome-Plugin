<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Base Notes</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #ffffff;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #6366f1;
        --accent-dark: #4f46e5;
        --soft: #f8fafc;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 384px;
        min-height: 480px;
        max-height: 580px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--bg);
        background: var(--soft);
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
      }
      .brand { display: flex; align-items: center; gap: 8px; }
      .brand .logo { width: 24px; height: 24px; border-radius: 7px; display: block; }
      .brand h1 { font-size: 15px; font-weight: 700; }
      .icon-btn {
        border: none; background: transparent; cursor: pointer; font-size: 16px; color: var(--muted);
        border-radius: 8px; padding: 6px 8px;
      }
      .icon-btn:hover { background: var(--soft); }

      .toolbar { padding: 12px 16px 6px; background: var(--panel); border-bottom: 1px solid var(--border); }
      .search {
        width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 10px;
        font-size: 13px; outline: none;
      }
      .search:focus { border-color: var(--accent); }
      .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
      .chip {
        cursor: pointer; border: 1px solid var(--border); background: #fff; color: #334155;
        border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 600;
      }
      .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

      .settings {
        display: none; padding: 14px 16px; background: #eef2ff; border-bottom: 1px solid var(--border);
      }
      .settings.open { display: block; }
      .settings label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 6px; }
      .settings input[type="password"], .settings input[type="text"] {
        width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; outline: none;
      }
      .row { display: flex; gap: 8px; margin-top: 8px; }
      .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: #334155; }
      .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.4; }
      .btn {
        cursor: pointer; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; border: 1px solid transparent;
      }
      .btn.primary { background: var(--accent); color: #fff; }
      .btn.primary:hover { background: var(--accent-dark); }
      .btn.secondary { background: #fff; color: #334155; border-color: var(--border); }
      .btn.secondary:hover { background: var(--soft); }
      .btn.block { width: 100%; margin-top: 10px; }

      .list { flex: 1; overflow-y: auto; padding: 12px 16px 16px; }
      .note {
        background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
        padding: 12px; margin-bottom: 10px;
      }
      .note-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
      .note-head-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
      .note-title { font-size: 13px; font-weight: 700; line-height: 1.35; min-width: 0; }
      .badge {
        flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
        background: #eef2ff; color: var(--accent-dark); white-space: nowrap;
      }
      .note-summary { font-size: 12px; color: #475569; margin-top: 6px; line-height: 1.45; }
      .note-text { font-size: 11px; color: #94a3b8; margin-top: 6px; max-height: 44px; overflow: hidden; line-height: 1.4; }
      .note-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 10px; }
      .src { font-size: 11px; color: var(--accent); text-decoration: none; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .src:hover { text-decoration: underline; }
      .synced { font-size: 10px; color: #16a34a; font-weight: 700; white-space: nowrap; }
      .del { border: none; background: transparent; cursor: pointer; color: #cbd5e1; font-size: 13px; flex-shrink: 0; }
      .del:hover { color: #dc2626; }

      .empty { text-align: center; color: var(--muted); padding: 48px 20px; }
      .empty .big { font-size: 32px; margin-bottom: 8px; }
      .empty p { font-size: 13px; line-height: 1.5; }

      .banner { font-size: 12px; padding: 8px 16px; text-align: center; display: none; }
      .banner.show { display: block; }
      .banner.ok { background: #dcfce7; color: #166534; }
      .banner.err { background: #fee2e2; color: #991b1b; }

      .settings select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: #fff; outline: none; }
      .search-row { display: flex; gap: 8px; }
      .search-row .search { flex: 1; }
      .btn.summarize { white-space: nowrap; padding: 9px 12px; }
      .btn:disabled { opacity: .45; cursor: not-allowed; }

      .digest { display: none; }
      .digest.show { display: block; margin: 12px 16px 0; padding: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; max-height: 240px; overflow: auto; }
      .digest-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
      .digest-title { font-size: 12px; font-weight: 700; }
      .digest-meta { display: block; font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 2px; }
      .digest-actions { display: flex; gap: 6px; flex-shrink: 0; }
      .digest-btn { cursor: pointer; border: 1px solid var(--border); background: var(--soft); color: #334155; border-radius: 7px; padding: 4px 8px; font-size: 11px; font-weight: 600; }
      .digest-btn:hover { background: #e2e8f0; }
      .digest-loading { font-size: 12px; color: var(--muted); }

      .md { line-height: 1.5; }
      .md p { margin: 0 0 6px; }
      .md p:last-child { margin-bottom: 0; }
      .md ul, .md ol { margin: 4px 0 6px 18px; }
      .md li { margin: 2px 0; }
      .md h3, .md h4, .md h5, .md h6 { font-size: 12px; font-weight: 700; margin: 8px 0 4px; }
      .md code { background: #f1f5f9; padding: 1px 4px; border-radius: 4px; font-size: 11px; }
      .md pre { background: #f1f5f9; padding: 8px; border-radius: 8px; overflow: auto; margin: 6px 0; }
      .md pre code { background: none; padding: 0; }
      .md a { color: var(--accent); }
      .md strong { font-weight: 700; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="logo" src="icons/icon48.png" alt="Knowledge Base logo" />
        <h1>Knowledge Base</h1>
      </div>
      <div>
        <a class="icon-btn" id="expandBtn" href="dashboard.html" target="_blank" title="Open full dashboard" style="text-decoration:none;">&#8599;</a>
        <button class="icon-btn" id="syncBtn" title="Sync to Google Sheets">&#8635;</button>
        <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
      </div>
    </header>

    <div class="banner" id="banner"></div>

    <section class="settings" id="settings">
      <label for="provider">AI Provider</label>
      <select id="provider">
        <option value="local">Local (LM Studio)</option>
        <option value="claude">Claude (Anthropic)</option>
      </select>

      <div id="localFields">
        <label for="baseUrl" style="margin-top:12px;">LM Studio Base URL</label>
        <input type="text" id="baseUrl" placeholder="http://localhost:1234" autocomplete="off" />
        <label for="model" style="margin-top:12px;">Model (optional)</label>
        <input type="text" id="model" placeholder="auto-detect from /v1/models" autocomplete="off" />
      </div>

      <div id="claudeFields">
        <label for="apiKey" style="margin-top:12px;">Claude API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
      </div>

      <div class="row">
        <button class="btn primary" id="saveKey">Save</button>
        <button class="btn secondary" id="clearKey">Clear key</button>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="autoSync" />
        <label for="autoSync" style="margin:0; text-transform:none; letter-spacing:0; font-weight:600; color:#334155;">Auto-sync new notes to Google Sheets</label>
      </div>
      <p class="hint">
        Default uses your local LM Studio server (no API key) - make sure its server is running with a model loaded.
        Switch to Claude to use Anthropic (needs a key). Google Sheets sync needs a Chrome Extension OAuth client ID in <code>manifest.json</code>.
      </p>
    </section>

    <div class="toolbar">
      <div class="search-row">
        <input type="text" class="search" id="search" placeholder="Search notes..." />
        <button class="btn primary summarize" id="summarizeBtn" title="AI summary of the selected tag">Summarize</button>
      </div>
      <div class="filters" id="filters"></div>
    </div>

    <div class="digest" id="digest"></div>

    <div class="list" id="list"></div>

    <script src="popup.js"></script>
  </body>
</html>
